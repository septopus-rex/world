<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="globe" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 7 tentacles radiating from bottom of globe -->
  <g stroke="#06b6d4" stroke-width="1.2" stroke-linecap="round" opacity="0.85">
    <!-- tentacle 1: left far -->
    <path d="M11 22 Q7 26 5 29" fill="none"/>
    <!-- tentacle 2: left mid -->
    <path d="M12.5 23 Q10 27 9 30" fill="none"/>
    <!-- tentacle 3: left -->
    <path d="M14 23.5 Q13 27.5 12.5 30" fill="none"/>
    <!-- tentacle 4: center -->
    <path d="M16 24 Q16 28 16 31" fill="none"/>
    <!-- tentacle 5: right -->
    <path d="M18 23.5 Q19 27.5 19.5 30" fill="none"/>
    <!-- tentacle 6: right mid -->
    <path d="M19.5 23 Q22 27 23 30" fill="none"/>
    <!-- tentacle 7: right far -->
    <path d="M21 22 Q25 26 27 29" fill="none"/>
  </g>

  <!-- Globe body -->
  <circle cx="16" cy="14" r="9.5" fill="url(#globe)"/>

  <!-- Globe grid lines -->
  <ellipse cx="16" cy="14" rx="9.5" ry="3.8" fill="none" stroke="#c4b5fd" stroke-width="0.6" opacity="0.4"/>
  <ellipse cx="16" cy="14" rx="5.5" ry="9.5" fill="none" stroke="#c4b5fd" stroke-width="0.6" opacity="0.35"/>
  <ellipse cx="16" cy="10.5" rx="7.5" ry="2.2" fill="none" stroke="#c4b5fd" stroke-width="0.5" opacity="0.25"/>

  <!-- Globe outline -->
  <circle cx="16" cy="14" r="9.5" fill="none" stroke="#a78bfa" stroke-width="0.8"/>

  <!-- Highlight -->
  <ellipse cx="13" cy="10" rx="3" ry="2" fill="white" opacity="0.12"/>

  <!-- 7 small stars around globe top -->
  <g fill="#f0abfc" opacity="0.9">
    <circle cx="7"  cy="7"  r="0.7"/>
    <circle cx="10" cy="4"  r="0.5"/>
    <circle cx="16" cy="3"  r="0.7"/>
    <circle cx="22" cy="4"  r="0.5"/>
    <circle cx="25" cy="7"  r="0.7"/>
    <circle cx="5"  cy="12" r="0.4"/>
    <circle cx="27" cy="12" r="0.4"/>
  </g>
</svg>
